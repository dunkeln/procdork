<svg viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Most input context was reused across 24 completed workflows</title>
  <desc id="desc">The workflows requested 6.31 million cumulative input tokens. 5.69 million, or 90.1 percent, were cached; 625 thousand, or 9.9 percent, were fresh. The workflows produced 44.7 thousand output tokens.</desc>
  <defs>
    <clipPath id="input-bar"><rect x="76" y="164" width="808" height="64" rx="6"/></clipPath>
  </defs>

  <text x="28" y="40" font-size="22" font-weight="700" fill="#ffffff">Most repeated context was reused.</text>
  <text x="28" y="66" font-size="13" fill="#ffffff" opacity="0.82">Observed across 24 completed adversarial workflows.</text>

  <text x="76" y="126" font-size="13" font-weight="700" fill="#b8b8ff">6.31M cumulative input tokens</text>
  <g clip-path="url(#input-bar)">
    <rect x="76" y="164" width="728" height="64" fill="#b8b8ff"/>
    <rect x="804" y="164" width="80" height="64" fill="#ce4257"/>
  </g>

  <text x="440" y="190" font-size="18" font-weight="700" fill="#191b24" text-anchor="middle">90.1% cached</text>
  <text x="440" y="211" font-size="12" fill="#191b24" text-anchor="middle">5.69M tokens reused from cache</text>
  <text x="844" y="190" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">9.9%</text>
  <text x="844" y="210" font-size="11" fill="#ffffff" text-anchor="middle">fresh</text>

  <line x1="844" y1="228" x2="844" y2="272" stroke="#ce4257" stroke-width="2"/>
  <text x="844" y="294" font-size="14" font-weight="700" fill="#ce4257" text-anchor="middle">625K fresh input</text>

  <path d="M480 258 L480 312 L578 312" fill="none" stroke="#b8b8ff" stroke-width="2" stroke-opacity="0.6"/>
  <path d="M578 312 l-9 -6 v12 z" fill="#b8b8ff" opacity="0.8"/>
  <text x="596" y="307" font-size="14" font-weight="700" fill="#b8b8ff">44.7K output</text>
  <text x="596" y="327" font-size="11" fill="#b8b8ff" opacity="0.78">answers returned by the agent</text>

  <text x="76" y="382" font-size="12" font-weight="700" fill="#b8b8ff">What this proves: only 9.9% of cumulative input was fresh.</text>
  <text x="76" y="402" font-size="11" fill="#b8b8ff" opacity="0.78">Cached tokens are still processed and may still be billed. This is context reuse, not measured human-time or dollar savings.</text>
</svg>
