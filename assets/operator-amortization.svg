<svg viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">One reviewed release serves more workflows with less operator work per workflow</title>
  <desc id="desc">One operator review spread across one workflow equals one operator touch per workflow. Across ten workflows it equals 0.1, across one hundred 0.01, and across one thousand 0.001. As reuse grows, operator work per workflow approaches zero.</desc>

  <text x="28" y="40" font-size="22" font-weight="700" fill="#ffffff">One review serves every workflow after it.</text>
  <text x="28" y="66" font-size="13" fill="#ffffff" opacity="0.82">One unchanged release, reused across more requests.</text>

  <line x1="108" y1="112" x2="108" y2="326" stroke="#b8b8ff" stroke-opacity="0.45"/>
  <line x1="108" y1="326" x2="884" y2="326" stroke="#b8b8ff" stroke-opacity="0.45"/>

  <text x="94" y="116" font-size="12" fill="#b8b8ff" text-anchor="end">1.0</text>
  <text x="94" y="310" font-size="12" fill="#b8b8ff" text-anchor="end">0</text>
  <text x="30" y="222" font-size="12" fill="#b8b8ff" text-anchor="middle" transform="rotate(-90 30 222)">operator touches per workflow</text>

  <path d="M136 116 C190 196 232 264 300 294 C368 318 452 323 528 324 C620 325 716 325 812 325" fill="none" stroke="#ce4257" stroke-width="6" stroke-linecap="round"/>
  <path d="M812 325 L874 325" fill="none" stroke="#ce4257" stroke-width="6" stroke-linecap="round" stroke-dasharray="5 10"/>

  <g fill="#ce4257">
    <circle cx="136" cy="116" r="7"/>
    <circle cx="300" cy="294" r="7"/>
    <circle cx="476" cy="323" r="7"/>
    <circle cx="652" cy="325" r="7"/>
  </g>

  <g font-size="14" font-weight="700" fill="#b8b8ff" text-anchor="middle">
    <text x="136" y="98">1.0</text>
    <text x="300" y="275">0.1</text>
    <text x="476" y="302">0.01</text>
    <text x="652" y="304">0.001</text>
    <text x="848" y="304">approaches 0</text>
  </g>

  <g font-size="12" fill="#b8b8ff" text-anchor="middle">
    <text x="136" y="352">1 workflow</text>
    <text x="300" y="352">10 workflows</text>
    <text x="476" y="352">100 workflows</text>
    <text x="652" y="352">1,000 workflows</text>
    <text x="848" y="352">as reuse grows</text>
  </g>

  <text x="108" y="398" font-size="12" font-weight="700" fill="#b8b8ff">What this shows: operator judgment is reused, not removed.</text>
  <text x="108" y="418" font-size="11" fill="#b8b8ff" opacity="0.78">Illustrative 1 / N amortization. A change to data, transforms, knowledge, or evaluations starts a new review cycle.</text>
</svg>
