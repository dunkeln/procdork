<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analytics chart</title>
    <style>
      html, body { margin: 0; background: transparent; color: CanvasText; font: 14px system-ui, sans-serif; }
      img { display: block; width: 100%; height: auto; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 8px; border-bottom: 1px solid color-mix(in srgb, CanvasText 20%, transparent); text-align: left; }
      #status { padding: 12px; }
    </style>
  </head>
  <body>
    <main id="result"><p id="status">Loading analytics...</p></main>
    <script>
      const result = document.querySelector("#result");
      const send = (message) => window.parent.postMessage({ jsonrpc: "2.0", ...message }, "*");
      const resize = () => send({
        method: "ui/notifications/size-changed",
        params: { width: document.documentElement.scrollWidth, height: document.documentElement.scrollHeight },
      });
      const render = (toolResult) => {
        const data = toolResult.structuredContent;
        result.replaceChildren();
        if (data?.image) {
          const chart = document.createElement("img");
          chart.alt = data.title ?? "Analytics chart";
          chart.src = `data:${data.image.mimeType};base64,${data.image.data}`;
          result.append(chart);
        } else if (data?.chart_kind === "table") {
          const table = document.createElement("table");
          const head = table.createTHead().insertRow();
          for (const column of data.columns ?? []) head.append(Object.assign(document.createElement("th"), { textContent: column }));
          const body = table.createTBody();
          for (const row of data.rows ?? []) {
            const tr = body.insertRow();
            for (const value of row) tr.insertCell().textContent = value ?? "";
          }
          result.append(table);
        } else {
          result.textContent = "No renderable analytics result was returned.";
        }
        requestAnimationFrame(resize);
      };

      window.addEventListener("message", (event) => {
        if (event.source !== window.parent || event.data?.jsonrpc !== "2.0") return;
        if (event.data.id === 1) {
          if (event.data.error) {
            result.textContent = `MCP App initialization failed: ${event.data.error.message}`;
            return;
          }
          send({ method: "ui/notifications/initialized" });
          requestAnimationFrame(resize);
        } else if (event.data.method === "ui/notifications/tool-result") {
          render(event.data.params);
        }
      });
      send({
        id: 1,
        method: "ui/initialize",
        params: {
          appInfo: { name: "Analytics chart", version: "0.1.0" },
          appCapabilities: {},
          protocolVersion: "2026-01-26",
        },
      });
    </script>
  </body>
</html>
