version: 2

sources:
  - name: harness
    schema: main
    tables:
      - name: raw_manifest
        description: Raw capture manifest loaded by the harness EL path.
      - name: raw_evaluation_results
        description: Provider-neutral results written by scheduled evaluator jobs.
      - name: raw_ingestion_events
        description: Append-only completion events emitted by the document-ingestion service.
      - name: raw_refresh_runs
        description: Scheduler receipts for source sync and dbt publication outcomes.
  - name: app
    schema: main
    tables:
      - name: app_sessions
        description: Demo web chat sessions synced from Neon.
      - name: app_messages
        description: Demo web chat messages synced from Neon.
      - name: app_message_events
        description: Demo web chat event stream synced from Neon.
      - name: app_sources
        description: Demo web cited sources synced from Neon.
      - name: app_message_sources
        description: Demo web message-source links synced from Neon.
